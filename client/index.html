<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Support Desk</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="dashboard">

<div class="app">

  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__mark">SD</div>
      <div class="sidebar__title">Support Desk<small>Ticket Management</small></div>
    </div>

    <nav class="nav">
      <a class="nav__link" data-page="dashboard" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Dashboard
      </a>
      <a class="nav__link" data-page="tickets" href="pages/tickets.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8Z"/><path d="M13 6v12" stroke-dasharray="2 2"/></svg>
        Tickets
      </a>
      <a class="nav__link" data-page="customers" href="pages/customers.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5"/><path d="M16.5 8.5a3 3 0 1 1 3.4 3M20 20a5.5 5.5 0 0 0-4-5.3"/></svg>
        Customers
      </a>
    </nav>

    <div class="sidebar__foot">CODOC Intern Programme<br>Assignment 3</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <p class="topbar__eyebrow">Overview</p>
        <h1>Dashboard</h1>
      </div>
      <a href="pages/tickets.html" class="btn btn--brand">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Ticket
      </a>
    </div>

    <section class="stub-grid" id="statCards">
      <div class="stub stub--total">
        <div class="stub__label">Total tickets</div>
        <div class="stub__value" data-stat="total">—</div>
      </div>
      <div class="stub stub--open">
        <div class="stub__label">Open</div>
        <div class="stub__value" data-stat="open">—</div>
      </div>
      <div class="stub stub--progress">
        <div class="stub__label">In progress</div>
        <div class="stub__value" data-stat="inProgress">—</div>
      </div>
      <div class="stub stub--closed">
        <div class="stub__label">Closed</div>
        <div class="stub__value" data-stat="closed">—</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel__head">
        <h2>Recent tickets</h2>
        <a href="pages/tickets.html" class="btn btn--ghost btn--sm">View all</a>
      </div>
      <div class="table-wrap">
        <table class="data">
          <thead>
            <tr>
              <th>ID</th>
              <th>Subject</th>
              <th>Customer</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="recentTicketsBody">
            <tr><td colspan="6"><div class="state">Loading recent tickets…</div></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
