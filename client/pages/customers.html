<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Manage customer records in the Support Desk system.">
<title>Customers · Support Desk</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="customers">

<div class="app">

  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__mark">SD</div>
      <div class="sidebar__title">Support Desk<small>Ticket Management</small></div>
    </div>

    <nav class="nav">
      <a class="nav__link" data-page="dashboard" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Dashboard
      </a>
      <a class="nav__link" data-page="tickets" href="tickets.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8Z"/><path d="M13 6v12" stroke-dasharray="2 2"/></svg>
        Tickets
      </a>
      <a class="nav__link" data-page="customers" href="customers.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5"/><path d="M16.5 8.5a3 3 0 1 1 3.4 3M20 20a5.5 5.5 0 0 0-4-5.3"/></svg>
        Customers
      </a>
    </nav>

    <div class="sidebar__foot">CODOC Intern Programme<br>Assignment 3</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <p class="topbar__eyebrow">Manage</p>
        <h1>Customers</h1>
      </div>
      <button id="btnNewCustomer" class="btn btn--brand">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add Customer
      </button>
    </div>

    <section class="panel">
      <!-- Search toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="customerSearch" type="search" class="input" placeholder="Search by name, email or company…" autocomplete="off">
        </div>
        <button id="btnClearCustomerSearch" class="btn btn--ghost btn--sm">Clear</button>
      </div>

      <p id="customerCount" class="result-count"></p>

      <div class="table-wrap">
        <table class="data" id="customersTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Company</th>
              <th>Tickets</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="customersBody">
            <tr><td colspan="7"><div class="state">Loading customers…</div></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<!-- ── Add / Edit Customer Modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="customerModalOverlay" role="dialog" aria-modal="true" aria-labelledby="customerModalTitle">
  <div class="modal">
    <div class="modal__head">
      <h2 id="customerModalTitle">Add Customer</h2>
      <button class="modal__close" id="customerModalClose" aria-label="Close">✕</button>
    </div>
    <div class="modal__body">
      <div class="form-row" id="rowCustName">
        <label for="custName">Full Name <span class="req">*</span></label>
        <input id="custName" type="text" class="input" placeholder="e.g. Jane Smith" maxlength="120" aria-required="true">
        <span class="error-text" id="errCustName">Name is required.</span>
      </div>
      <div class="form-row" id="rowCustEmail">
        <label for="custEmail">Email Address <span class="req">*</span></label>
        <input id="custEmail" type="email" class="input" placeholder="email@example.com" aria-required="true">
        <span class="error-text" id="errCustEmail">A valid email address is required.</span>
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label for="custPhone">Phone</label>
          <input id="custPhone" type="tel" class="input" placeholder="Optional">
        </div>
        <div class="form-row">
          <label for="custCompany">Company</label>
          <input id="custCompany" type="text" class="input" placeholder="Optional" maxlength="120">
        </div>
      </div>
    </div>
    <div class="modal__foot">
      <button class="btn btn--ghost" id="customerModalCancel">Cancel</button>
      <button class="btn btn--brand" id="customerModalSave">Add Customer</button>
    </div>
  </div>
</div>

<!-- ── View Customer Detail Modal ────────────────────────────────────────── -->
<div class="modal-overlay" id="viewCustOverlay" role="dialog" aria-modal="true" aria-labelledby="viewCustTitle">
  <div class="modal modal--wide">
    <div class="modal__head">
      <h2 id="viewCustTitle">Customer</h2>
      <button class="modal__close" id="viewCustClose" aria-label="Close">✕</button>
    </div>
    <div class="modal__body" id="viewCustBody"></div>
    <div class="modal__foot">
      <button class="btn btn--ghost" id="viewCustClose2">Close</button>
      <button class="btn btn--ghost" id="viewCustEdit">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/customers.js"></script>
</body>
</html>
